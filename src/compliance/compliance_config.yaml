# compliance_config.yaml — BANXE AML Policy Configuration
#
# 12-Factor Factor III: config separate from code.
# All policy thresholds and jurisdiction lists live here — NOT in Python source.
#
# CHANGE CONTROL:
#   Any modification to decision_thresholds or jurisdictions requires:
#   1. MLRO written approval
#   2. Git commit with MLRO name in commit message
#   3. Notification to FCA within 60 days (SUP 15.11)
#
# Override in tests / staging:
#   export COMPLIANCE_CONFIG_PATH=/path/to/test_compliance_config.yaml
#
# Authority: FCA MLR 2017, SAMLA 2018, UK HMT Consolidated List
# Version tracked in git — see `git log src/compliance/compliance_config.yaml`
# ──────────────────────────────────────────────────────────────────────────────

policy:
  version:          "developer-core@2026-04-05"
  jurisdiction:     "UK"
  regulator:        "FCA"
  framework:        "MLR 2017"
  audit_ttl_years:  5          # FCA MLR 2017 minimum retention: 5 years


# ── Decision thresholds ────────────────────────────────────────────────────────
# DO NOT CHANGE without MLRO approval + git audit trail.
# These values are the canonical decision boundaries for all AML engines.
#
# SAR    >= 85  →  Suspicious Activity Report + MLRO alert (POCA 2002 §330)
# REJECT >= 70  →  Transaction blocked, customer notified (MLR 2017 §21(3))
# HOLD   >= 40  →  Enhanced Due Diligence required (FCA EDD §4)
# APPROVE < 40  →  No restrictions, standard monitoring applies

decision_thresholds:
  sar:    85
  reject: 70
  hold:   40


# ── Watchman / Yente fuzzy matching ───────────────────────────────────────────
# min_match: Jaro-Winkler similarity threshold (0.0–1.0)
# Invariant: never lower min_match without MLRO approval (false-negative risk)

watchman:
  url:       "http://127.0.0.1:8084"
  min_match: 0.80               # matches yente_min_score — consistent across engines
  timeout:   5                  # seconds

sanctions_screening:
  yente_min_score: 0.80         # YENTE REST API confidence floor


# ── Jurisdiction classification ────────────────────────────────────────────────
# Category A (hard_block): IMMEDIATE REJECT/SAR regardless of composite score.
#   Authority: SAMLA 2018, UK HMT Consolidated List, OFAC SDN
#   NOTE: Syria (SY) moved to Category B (HOLD) July 2025 — FCA guidance update.
#
# Category B (high_risk): EDD mandatory, minimum HOLD floor applied.
#   Authority: FCA EDD §4.2, FATF high-risk jurisdictions

jurisdictions:
  hard_block:
    - RU       # Russia — SAMLA 2018
    - BY       # Belarus — UK sanctions
    - IR       # Iran — SAMLA 2018
    - KP       # North Korea — UNSC Res 1718
    - CU       # Cuba — OFAC
    - MM       # Myanmar — UK sanctions
    - AF       # Afghanistan — SAMLA 2018
    - VE       # Venezuela — UK sanctions
    - CRIMEA   # Crimea region — SAMLA 2018
    - DNR      # Donetsk People's Republic — SAMLA 2018
    - LNR      # Luhansk People's Republic — SAMLA 2018

  high_risk:
    - SY       # Syria — Category B since July 2025 (was Cat A)
    - IQ       # Iraq — FATF
    - LB       # Lebanon — FATF
    - YE       # Yemen — FATF
    - HT       # Haiti — FATF
    - ML       # Mali — FATF


# ── Transaction monitoring ─────────────────────────────────────────────────────
# mlr_reporting_threshold_gbp: single-transaction reporting threshold (MLR 2017)
# Transactions at/above this amount trigger enhanced monitoring signals.

transaction_monitoring:
  mlr_reporting_threshold_gbp: 10000   # MLR 2017 single-tx threshold (£10,000)


# ── Forbidden patterns (red-line phrases agents MUST NOT emit) ─────────────────
# These regex patterns are checked against every agent output.
# A match → REFUTED verdict (compliance violation).
# Authority: FCA MLR 2017 §3 / AML Red Line

forbidden_patterns:
  - bypass\s+kyc
  - skip\s+kyc
  - skip\s+(sanctions|screening|edd|aml|verification|check)
  - no\s+need\s+to\s+report
  - ignore\s+(risk|alert|flag)
  - approve\s+without\s+(check|review|screening|kyc|edd|verification|enhanced\s+due\s+diligence)
  - without\s+kyc
  - without\s+edd
  - without\s+enhanced\s+due\s+diligence
  - without\s+verification
  - transfer\s+without\s+(monitoring|reporting)
  - structure\s+.*payment
  - split\s+.*avoid\s+(report|threshold|limit)
  - verify\s+later
  - exception\s+for\s+(vip|client|customer)
  - pep.*without\s+(edd|enhanced|due\s+diligence|review|hitl|mlro)
  - approve.*pep.{0,40}without
